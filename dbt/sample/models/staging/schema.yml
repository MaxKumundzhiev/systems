version: 2

models:
  - name: stg_customers
    description: "Cleaned customer data from raw source"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      
      - name: email
        description: "Customer email address"
        tests:
          - not_null
          - unique

  - name: stg_orders
    description: "Completed orders only"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      
      - name: status
        tests:
          - accepted_values:
              values: ['completed']
      
      - name: amount
        tests:
          - not_null