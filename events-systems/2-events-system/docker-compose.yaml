version: "3.9"

services:
  gateway:
    build:
      context: ./
      dockerfile: gateway.Dockerfile
    hostname: gateway
    container_name: gateway
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/home/app
    networks:
      - microservices
  orders:
    build:
      context: ./
      dockerfile: orders.Dockerfile
    hostname: orders
    container_name: orders
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./:/home/app
    networks:
      - microservices
  notifications:
    build:
      context: ./
      dockerfile: notifications.Dockerfile
    hostname: notifications
    container_name: notifications
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8002:8000"
    env_file:
      - .env
    volumes:
      - ./:/home/app
    networks:
      - microservices

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8080:8080"
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    networks:
      - microservices

  kafka:
    image: obsidiandynamics/kafka
    container_name: kafka
    ports:
      - "2181:2181"
    environment:
      KAFKA_LISTENERS: "PLAINTEXT://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    healthcheck:
      test: nc -z localhost 29092 || exit
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - microservices

networks:
  microservices:
    external: true